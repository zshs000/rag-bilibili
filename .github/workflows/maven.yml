# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file rag-bilibili-server/pom.xml

    - name: Upload jar to ECS
      # 仅 push 到 master 时部署，PR 只构建不部署
      if: github.event_name == 'push'
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USER }}
        key: ${{ secrets.ECS_SSH_KEY }}
        source: "rag-bilibili-server/target/rag-bilibili-server-1.0.0.jar"
        target: "/opt/rag-bilibili/"
        strip_components: 2

    - name: Deploy to ECS
      if: github.event_name == 'push'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.ECS_HOST }}
        username: ${{ secrets.ECS_USER }}
        key: ${{ secrets.ECS_SSH_KEY }}
        script: |
          # 停止旧进程
          pkill -f rag-bilibili-server-1.0.0.jar || true
          sleep 2
          # 用 setsid 创建新进程组，完全脱离当前会话
          setsid bash -c 'nohup java -Xmx768m -jar /opt/rag-bilibili/rag-bilibili-server-1.0.0.jar > /opt/rag-bilibili/app.log 2>&1 &'
          sleep 5
          # 验证进程是否启动
          pgrep -f rag-bilibili-server-1.0.0.jar && echo "Deploy success" || echo "Deploy failed"
