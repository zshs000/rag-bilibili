spring:
  application:
    name: rag-bilibili-server

  autoconfigure:
    exclude:
      - org.springframework.ai.model.chat.client.autoconfigure.ChatClientAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/rag_bilibili?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    model:
      chat: openai
      embedding: dashscope

    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:}
      chat:
        options:
          model: deepseek-v3.2
          temperature: 0.7

    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024

    alibaba:
      dashvector:
        api-key: ${DASHVECTOR_API_KEY:}
        endpoint: ${DASHVECTOR_ENDPOINT:}
        collection: bilibili

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.ragbilibili.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:R@g-B1l1b1l1#2024$Xk9mPqZ3nVwL7eJcFhAsDuYtNbOiR5}
  expiration: 604800000  # 7天，单位毫秒

register:
  enabled: true

rag:
  subtitle-cleaning:
    max-window-size: 3
    conditional-expand-to-3: true
    weak-keyword-threshold: 2
    strong-patterns:
      - "本[期条次个]视频由.+赞助"
      - "感谢.+对本[期条次个]视频的支持"
      - "点击.{0,8}(下方|下边).{0,8}(链接|购物车)"
      - "下载.{0,12}(app|APP|软件|应用)"
      - "记得.{0,8}(一键三连|三连|点赞|投币|收藏)"
      - "商务合作"
      - "邀请码"
      - "首单立减"
      - "限时优惠"
      - "高价回收"
    weak-keywords:
      - "转转"
      - "转转二手"
      - "赞助"
      - "三连"
      - "点赞"
      - "投币"
      - "收藏"
      - "关注"
      - "转发"
      - "链接"
      - "下单"
      - "优惠"
      - "折扣"
      - "返现"
      - "补贴"
      - "邀请码"
      - "商务合作"
      - "高价回收"
      - "回收闲置"
      - "下载app"
      - "购物车"
      - "点击下方"
    suspicious-patterns:
      - "感谢"
      - "赞助"
      - "点击.{0,8}(下方|下边)?"
      - "链接"
      - "下载"
      - "优惠"
      - "邀请码"
      - "商务合作"
      - "转转"
      - "购物车"
  subtitle-probe:
    enabled: true
    node-command: node
    script-path: ../subtitle-probe/probe.mjs
    timeout-millis: 10000
    retry-delays-millis:
      - 1000
      - 2500
      - 5000

logging:
  level:
    com.example.ragbilibili: INFO
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
